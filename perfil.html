<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22><rect width=%2232%22 height=%2232%22 rx=%226%22 fill=%22%23000%22/><text x=%2216%22 y=%2221%22 font-family=%22Georgia,serif%22 font-size=%2215%22 font-weight=%22700%22 fill=%22%23D4AF37%22 text-anchor=%22middle%22>BI</text></svg>">
  <meta name="RATING" content="RTA-5042-1996-1400-1577-RTA">
  <title>Perfil — Bellas Independientes | Escorts en Tucumán</title>
  <meta name="description" content="Perfil verificado de acompañante en Tucumán. Fotos reales y datos de contacto. Contenido +18.">
  <meta name="robots" content="noindex,follow">
  <meta property="og:type" content="profile">
  <meta property="og:site_name" content="Bellas Independientes">
  <meta property="og:title" content="Perfil de acompañante en Tucumán — Bellas Independientes">
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/legal-notices.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase.js"></script>
  <script src="/js/gallery.js" defer></script>
</head>
<body>
  <header class="header">
    <a href="/" class="header-logo">Bellas Independientes</a>
    <nav class="header-nav">
      <a href="/mujeres.html">Mujeres</a>
      <a href="/hombres.html">Hombres</a>
      <a href="/trans.html">Trans</a>
      <a href="/masajistas.html">Masajistas</a>
      <a href="/planes.html">Planes</a>
      <a href="/dashboard/login.html">Acceder</a>
    </nav>
  </header>

  <div id="profile-container"></div>

  <div id="lightbox" class="lightbox">
    <button class="lightbox-close" onclick="galleryHelpers.closeLightbox()">×</button>
    <img src="" alt="Foto">
  </div>

  <div id="site-footer"></div>
  <script src="/js/footer.js" defer></script>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');

      if (!slug) {
        document.getElementById('profile-container').innerHTML = '<p style="padding:2rem;color:#888;">Perfil no encontrado</p>';
        return;
      }

      try {
        const escort = await galleryHelpers.fetchEscortBySlug(slug);
        const photos = await galleryHelpers.fetchPhotos(escort.id);
        const portada = photos.find(p => p.es_portada) || photos[0];

        // servicios y ubicación se guardan como slugs de catálogos cerrados;
        // acá se traducen a los nombres que ve el visitante.
        const [{ data: catalogo }, { data: provincias }] = await Promise.all([
          window.supabaseClient.rpc('get_servicios_catalogo'),
          window.supabaseClient.rpc('get_provincias_catalogo'),
        ]);
        const nombreServicio = new Map((catalogo || []).map(s => [s.slug, s.nombre]));
        const nombreProvincia = new Map((provincias || []).map(p => [p.slug, p.nombre]));
        const provincia = nombreProvincia.get(escort.ubicacion) || '';
        const lugar = [escort.zona, provincia].filter(Boolean).join(', ');

        const container = document.getElementById('profile-container');

        const esc = (s) => String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

        // Botones de contacto destacados (WhatsApp primero, como en la referencia)
        const waIcon = '<svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M17.47 14.38c-.29-.15-1.7-.84-1.96-.93-.26-.1-.45-.15-.64.15-.19.29-.74.93-.9 1.12-.17.19-.33.22-.62.07-.29-.15-1.22-.45-2.32-1.43-.86-.77-1.44-1.71-1.6-2-.17-.29-.02-.45.13-.6.13-.13.29-.34.44-.51.15-.17.19-.29.29-.48.1-.19.05-.36-.02-.51-.07-.15-.64-1.55-.88-2.12-.23-.55-.47-.48-.64-.49-.17-.01-.36-.01-.55-.01-.19 0-.51.07-.77.36-.26.29-1.01.99-1.01 2.41 0 1.42 1.03 2.79 1.18 2.98.15.19 2.03 3.1 4.92 4.35.69.3 1.22.47 1.64.61.69.22 1.32.19 1.81.11.55-.08 1.7-.69 1.94-1.36.24-.67.24-1.24.17-1.36-.07-.12-.26-.19-.55-.34zM12.04 21.5h-.01c-1.75 0-3.47-.47-4.97-1.36l-.36-.21-3.7.97.99-3.6-.23-.37a9.4 9.4 0 0 1-1.44-5.03c0-5.2 4.24-9.44 9.45-9.44 2.52 0 4.89.98 6.67 2.77a9.36 9.36 0 0 1 2.76 6.68c0 5.2-4.24 9.44-9.45 9.44zm8.04-17.49A11.36 11.36 0 0 0 12.04.66C5.79.66.7 5.75.7 12c0 2 .52 3.95 1.52 5.67L.6 23.34l5.8-1.52a11.32 11.32 0 0 0 5.64 1.44h.01c6.25 0 11.34-5.09 11.34-11.34 0-3.03-1.18-5.88-3.32-8.02z"/></svg>';
        const phoneIcon = '<svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>';
        let contactHtml = '';
        if (escort.whatsapp) {
          const wa = String(escort.whatsapp).replace(/[^\d]/g, '');
          const msg = encodeURIComponent(`Hola ${escort.nombre}, te vi en Bellas Independientes y quería consultarte.`);
          contactHtml += `<a href="https://wa.me/${wa}?text=${msg}" target="_blank" rel="noopener" class="btn profile-contact-btn profile-contact-btn--wa">${waIcon}WhatsApp</a>`;
          contactHtml += `<a href="tel:+${wa}" class="btn profile-contact-btn profile-contact-btn--call">${phoneIcon}Llamar</a>`;
        }
        if (escort.instagram) {
          const ig = String(escort.instagram).replace(/^@/, '');
          contactHtml += `<a href="https://instagram.com/${esc(ig)}" target="_blank" rel="noopener" class="btn profile-contact-btn profile-contact-btn--ghost">Instagram</a>`;
        }

        // Ficha de datos: solo se muestran los campos cargados
        const fmtPrecio = (n) => '$' + Number(n).toLocaleString('es-AR');
        const datos = [
          ['Edad', escort.edad ? escort.edad + ' años' : null],
          ['Altura', escort.altura ? escort.altura + ' cm' : null],
          ['Nacionalidad', escort.nacionalidad],
          ['Ojos', escort.ojos],
          ['Cabello', escort.cabello],
          ['Provincia', provincia],
          ['Zona', escort.zona],
          ['Horario', escort.horario],
        ].filter(([, v]) => v);

        const datosHtml = datos.length
          ? `<ul class="profile-specs">${datos.map(([k, v]) => `<li><span>${k}</span><strong>${esc(v)}</strong></li>`).join('')}</ul>`
          : '';

        const tarifaHtml = escort.tarifa
          ? `<div class="profile-rate"><span>Tarifa</span><strong>${fmtPrecio(escort.tarifa)} <small>/ hora</small></strong></div>`
          : '';

        const chips = (items) => items.length
          ? `<div class="profile-chips">${items.map(s => `<span class="chip">${esc(s)}</span>`).join('')}</div>`
          : '';

        // Un slug sin traducción quedó fuera del catálogo (se desactivó): no se muestra.
        const servicios = (escort.servicios || [])
          .map(slug => nombreServicio.get(slug))
          .filter(Boolean);
        const idiomas = String(escort.idiomas || '').split(',').map(s => s.trim()).filter(Boolean);

        const serviciosHtml = servicios.length ? `<h3>Servicios</h3>${chips(servicios)}` : '';
        const idiomasHtml = idiomas.length ? `<h3>Idiomas</h3>${chips(idiomas)}` : '';

        container.innerHTML = `
          <div class="profile-hero">
            <img src="${portada?.url || 'https://via.placeholder.com/1200x600?text=Sin+foto'}" alt="${esc(escort.nombre)}">
            <div class="profile-info">
              <h1>${esc(escort.nombre)}${escort.edad ? ', ' + escort.edad : ''}</h1>
              <div class="profile-meta">
                <span>${esc(escort.categoria)}</span>
                ${lugar ? `<span>${esc(lugar)}</span>` : ''}
              </div>
            </div>
          </div>

          <div class="profile-content">
            <div>
              ${tarifaHtml}
              <div class="profile-contact">${contactHtml || '<p style="color:#888;">Sin datos de contacto</p>'}</div>

              <h3>Sobre mí</h3>
              <div class="profile-bio">
                <p>${escort.bio ? esc(escort.bio) : 'Sin descripción'}</p>
              </div>

              ${datosHtml ? `<h3>Datos</h3>${datosHtml}` : ''}
              ${serviciosHtml}
              ${idiomasHtml}
            </div>

            <div>
              <h3>Galería</h3>
              <div class="gallery-grid" id="gallery-grid"></div>
            </div>
          </div>

          <div class="profile-report">
            <a href="/denunciar.html?slug=${encodeURIComponent(slug)}" rel="nofollow">
              ⚑ Denunciar este perfil
            </a>
          </div>
        `;

        galleryHelpers.renderPhotoGrid(photos, 'gallery-grid');
      } catch (err) {
        document.getElementById('profile-container').innerHTML = '<p style="padding:2rem;color:#888;">Perfil no encontrado</p>';
      }
    });
  </script>
</body>
</html>
