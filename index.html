  <section class="feat" id="featured-section" hidden>
    <div class="section-head">
      <span class="section-kicker">✦ Selección</span>

  <script src="/js/footer.js" defer></script>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const escorts = await galleryHelpers.fetchEscorts();

        const destacadas = escorts.filter(e => e.destacada).slice(0, 6);
        const resto = escorts.filter(e => !e.destacada).slice(0, 12);

        // Sección destacada: solo se muestra si hay perfiles que compraron posición
        if (destacadas.length) {
          document.getElementById('featured-section').hidden = false;
          const featGrid = document.getElementById('featured-grid');
          for (const escort of destacadas) {
            const portada = await galleryHelpers.fetchPortada(escort.id);
            const card = galleryHelpers.renderCard(escort, portada.url);
            card.classList.add('card--feat');
            featGrid.appendChild(card);
          }
        }

        const grid = document.getElementById('escorts-grid');
        for (const escort of resto) {
          const portada = await galleryHelpers.fetchPortada(escort.id);
          grid.appendChild(galleryHelpers.renderCard(escort, portada.url));
        }
      } catch (err) {
        console.error('Error loading escorts:', err);
      }
    });
  </script>
