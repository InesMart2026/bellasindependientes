<body>
  <header class="header">

    <nav class="header-nav">
      <a href="/mujeres.html">Mujeres</a>

  <h2 class="section-title">Hombres</h2>

  <div class="filter-bar">
    <div class="filter-search">
      <span class="search-icon">&#x1F50D;</span>
      <input type="text" id="filter-search" placeholder="Buscar por nombre o ubicación..." autocomplete="off">
    </div>
    <div class="filter-group">
      <label>Edad</label>
      <input type="number" id="filter-edad-min" placeholder="Min" min="18" max="99">
      <span style="color:var(--text-secondary);">—</span>
      <input type="number" id="filter-edad-max" placeholder="Max" min="18" max="99">
    </div>
    <div class="filter-group">
      <label>Ordenar</label>
      <select id="filter-sort">
        <option value="fecha">Más nuevas</option>
        <option value="nombre">Nombre A-Z</option>
      </select>
    </div>
  </div>

  <div class="grid grid--slots" id="escorts-grid"></div>

  <div id="lightbox" class="lightbox">
    <button class="lightbox-close" onclick="galleryHelpers.closeLightbox()">×</button>
    <img src="" alt="Foto">
  </div>

  <div id="site-footer"></div>
  <script src="/js/footer.js" defer></script>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        // Si Supabase no responde, seguimos con lista vacía: el grid muestra
        // igual los 12 espacios "Tu Espacio Aquí".
        let escorts = [];
        try {
          escorts = await galleryHelpers.fetchEscorts('hombres') || [];
        } catch (e) {
          console.warn('No se pudieron cargar escorts, mostrando grid vacío:', e);
        }

        const grid = document.getElementById('escorts-grid');

        async function applyFilters() {
          const search = document.getElementById('filter-search').value;
          const edadMin = document.getElementById('filter-edad-min').value;
          const edadMax = document.getElementById('filter-edad-max').value;
          const sort = document.getElementById('filter-sort').value;
          const hayFiltros = search || edadMin || edadMax || sort === 'nombre';

          const filtered = galleryHelpers.filterEscorts(escorts, { search, edadMin, edadMax, sort });

          // Sin filtros: grid de 12 slots con "Tu Espacio Aquí" en los vacíos.
          // Con filtros: solo los resultados que coinciden.
          if (hayFiltros) {
            grid.classList.remove('grid--slots');
            await galleryHelpers.renderGrid(filtered, 'escorts-grid');
          } else {
            grid.classList.add('grid--slots');
            await galleryHelpers.renderSlots(filtered, 'escorts-grid', 12);
          }
        }

        document.getElementById('filter-search').addEventListener('input', applyFilters);
        document.getElementById('filter-edad-min').addEventListener('input', applyFilters);
        document.getElementById('filter-edad-max').addEventListener('input', applyFilters);
        document.getElementById('filter-sort').addEventListener('change', applyFilters);

        await applyFilters();
      } catch (err) { console.error(err); }
    });
  </script>
</body>
