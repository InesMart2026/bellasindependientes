<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bellas Escort Preview</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap');
:root {
  --bg-primary: #000; --bg-secondary: #111; --bg-card: #1A1A1A;
  --gold: #D4AF37; --gold-light: #F5E6A3;
  --text-primary: #FAFAFA; --text-secondary: #888; --border: #2A2A2A;
  --font-display: 'Playfair Display', serif;
  --font-body: 'Inter', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-body); background: var(--bg-primary); color: var(--text-primary); padding: 2rem; }
a { color: var(--gold); text-decoration: none; }

/* Header */
.header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 1rem 0; border-bottom: 1px solid var(--border); margin-bottom: 2rem;
}
.header-logo { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 3px; }
.header-nav { display: flex; gap: 2rem; }
.header-nav a { color: var(--text-secondary); font-size: .9rem; text-transform: uppercase; letter-spacing: 1px; }
.header-nav a:hover { color: var(--gold); }

/* Hero */
.hero {
  display: grid; grid-template-columns: 2fr 1fr; grid-template-rows: 300px 300px;
  gap: 4px; height: 604px; overflow: hidden; margin-bottom: 2rem;
}
.hero-item { position: relative; overflow: hidden; }
.hero-item img { width: 100%; height: 100%; object-fit: cover; }
.hero-item:first-child { grid-row: 1 / 3; }
.hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,.8) 0%, transparent 60%);
  display: flex; flex-direction: column; justify-content: flex-end; padding: 2rem;
}
.hero-overlay h1 { font-family: var(--font-display); font-size: 3rem; font-weight: 700; line-height: 1.1; }

/* Category nav */
.categories-nav { display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem; }
.cat-btn {
  background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
  padding: .75rem 2rem; font-family: var(--font-body); font-size: .9rem;
  text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all .3s;
}
.cat-btn:hover, .cat-btn.active { border-color: var(--gold); color: var(--gold); }

.section-title { font-family: var(--font-display); font-size: 2rem; text-align: center; margin-bottom: 1.5rem; }

/* Filter Bar */
.filter-bar {
  display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;
  padding: 1rem 0; max-width: 1200px; margin: 0 auto 1.5rem;
}
.filter-search { flex: 1; min-width: 200px; position: relative; }
.filter-search input {
  width: 100%; padding: .65rem 1rem .65rem 2.5rem;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text-primary);
  font-family: var(--font-body); font-size: .9rem; outline: none;
}
.filter-search input:focus { border-color: var(--gold); }
.filter-search .search-icon { position: absolute; left: .8rem; top: 50%; transform: translateY(-50%); color: var(--text-secondary); pointer-events: none; }
.filter-group { display: flex; gap: .5rem; align-items: center; }
.filter-group label { font-size: .8rem; color: var(--text-secondary); white-space: nowrap; }
.filter-group input, .filter-group select {
  padding: .55rem .75rem; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text-primary); font-family: var(--font-body); font-size: .85rem; outline: none; max-width: 90px;
}
.filter-group select { max-width: 150px; cursor: pointer; }
.filter-group input:focus, .filter-group select:focus { border-color: var(--gold); }

/* Grid */
.grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1.5rem; padding-bottom: 2rem;
}
.card {
  position: relative; background: var(--bg-card); border-radius: 4px;
  overflow: hidden; transition: transform .3s, box-shadow .3s; cursor: pointer;
}
.card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(212,175,55,.15); }
.card-img { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; }
.card-body {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 1.5rem 1rem 1rem;
  background: linear-gradient(to top, rgba(0,0,0,.9) 0%, transparent 100%);
}
.card-body h3 { font-size: 1.1rem; font-weight: 600; }
.card-body p { color: var(--text-secondary); font-size: .85rem; margin-top: .25rem; }
.card-badge {
  position: absolute; top: 1rem; right: 1rem;
  background: var(--gold); color: #000; padding: .25rem .75rem;
  font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
  border-radius: 2px;
}

.footer { border-top: 1px solid var(--border); padding: 2rem; text-align: center; color: var(--text-secondary); font-size: .85rem; margin-top: 2rem; }
</style>
</head>
<body>

<header class="header">
  <a href="#" class="header-logo">Bellas Escort</a>
  <nav class="header-nav">
    <a href="#">Mujeres</a>
    <a href="#">Hombres</a>
    <a href="#">Trans</a>
    <a href="#">Planes</a>
    <a href="#">Acceder</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-item">
    <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=800" alt="" loading="lazy">
    <div class="hero-overlay"><h1>Encontrá la compañía perfecta</h1></div>
  </div>
  <div class="hero-item"><img src="https://images.unsplash.com/photo-1504257432389-52343af06ae3?w=400" alt="" loading="lazy"></div>
  <div class="hero-item"><img src="https://images.unsplash.com/photo-1519699047748-de8e457a634e?w=400" alt="" loading="lazy"></div>
</section>

<nav class="categories-nav">
  <a href="#" class="cat-btn active">Mujeres</a>
  <a href="#" class="cat-btn">Hombres</a>
  <a href="#" class="cat-btn">Trans</a>
</nav>

<h2 class="section-title">Categorías</h2>

<!-- Filter Bar -->
<div class="filter-bar">
  <div class="filter-search">
    <span class="search-icon">&#x1F50D;</span>
    <input type="text" placeholder="Buscar por nombre o ubicación...">
  </div>
  <div class="filter-group">
    <label>Edad</label>
    <input type="number" placeholder="Min" min="18" max="99">
    <span style="color:var(--text-secondary);">—</span>
    <input type="number" placeholder="Max" min="18" max="99">
  </div>
  <div class="filter-group">
    <label>Ordenar</label>
    <select><option>Más nuevas</option><option>Nombre A-Z</option></select>
  </div>
</div>

<div class="grid" id="escorts-grid"></div>

<footer class="footer"><p>Bellas Escort &copy; 2026 &mdash; Todos los derechos reservados</p></footer>

<script>
const mockEscorts = [
  { nombre: 'Sofía', edad: 24, ubicacion: 'Buenos Aires', categoria: 'mujeres', slug: 'sofia', img: 'https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=600&h=800&fit=crop' },
  { nombre: 'Valentina', edad: 28, ubicacion: 'Córdoba', categoria: 'mujeres', slug: 'valentina', img: 'https://images.unsplash.com/photo-1504257432389-52343af06ae3?w=600&h=800&fit=crop' },
  { nombre: 'Camila', edad: 22, ubicacion: 'Rosario', categoria: 'mujeres', slug: 'camila', img: 'https://images.unsplash.com/photo-1519699047748-de8e457a634e?w=600&h=800&fit=crop' },
  { nombre: 'Martina', edad: 26, ubicacion: 'Mendoza', categoria: 'mujeres', slug: 'martina', img: 'https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=600&h=800&fit=crop' },
  { nombre: 'Lucía', edad: 30, ubicacion: 'La Plata', categoria: 'mujeres', slug: 'lucia', img: 'https://images.unsplash.com/photo-1517841905240-472988babdf9?w=600&h=800&fit=crop' },
  { nombre: 'Isabella', edad: 23, ubicacion: 'Tucumán', categoria: 'mujeres', slug: 'isabella', img: 'https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=600&h=800&fit=crop' }
];

const grid = document.getElementById('escorts-grid');

async function renderAll() {
  for (const e of mockEscorts) {
    const card = document.createElement('a');
    card.className = 'card';
    card.href = '#';
    card.innerHTML = `
      <img class="card-img" src="${e.img}" alt="${e.nombre}" loading="lazy">
      <span class="card-badge">${e.categoria}</span>
      <div class="card-body">
        <h3>${e.nombre}, ${e.edad}</h3>
        <p>${e.ubicacion}</p>
      </div>
    `;
    grid.appendChild(card);
  }
}

renderAll();
</script>
</body>
</html>
