<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Fotos — Bellas Escort</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/gallery.js"></script>
  <script src="/js/upload.js" defer></script>
</head>
<body>
  <div class="dashboard-layout">
    <aside class="dashboard-sidebar">
      <a href="/dashboard/" class="header-logo">Bellas Escort</a>
      <ul class="dashboard-nav">
        <li><a href="/dashboard/">Panel</a></li>
        <li><a href="/dashboard/fotos.html" class="active">Mis Fotos</a></li>
        <li><a href="/dashboard/perfil.html">Mi Perfil</a></li>
        <li><a href="/dashboard/verificacion.html">Verificación</a></li>
        <li><a href="/dashboard/plan.html">Mi Plan</a></li>
        <li><a href="#" onclick="authHelpers.logout()">Cerrar sesión</a></li>
      </ul>
    </aside>

    <main class="dashboard-main">
      <div class="dashboard-header">
        <h2>Mis Fotos</h2>
      </div>

      <!-- Gate de consentimiento: sin esta declaración no se puede subir. -->
      <div id="consent-gate" style="display:none;background:var(--card,#1a1a1a);border:1px solid var(--border,#333);border-radius:12px;padding:1.5rem;max-width:640px;margin-bottom:1.5rem;">
        <h3 style="margin:0 0 .75rem;">Antes de subir fotos</h3>
        <label style="display:flex;gap:.6rem;align-items:flex-start;cursor:pointer;font-weight:400;">
          <input type="checkbox" id="consent-check" style="margin-top:.25rem;width:auto;">
          <span style="font-size:.9rem;color:var(--text-secondary,#aaa);line-height:1.5;">
            Declaro bajo juramento que soy la persona que aparece en las
            imágenes que voy a publicar, que era mayor de 18 años al momento
            en que fueron tomadas, y que tengo el derecho y el consentimiento
            para publicarlas. Entiendo que subir imágenes de un menor o de un
            tercero sin su consentimiento es un delito y motivo de bloqueo y
            denuncia a la autoridad.
          </span>
        </label>
        <button type="button" id="consent-accept" class="btn btn-gold" disabled style="margin-top:1rem;">
          Aceptar y habilitar subida
        </button>
      </div>

      <div class="upload-area" id="upload-area" style="display:none;">
        <p style="font-size:2rem;color:var(--gold);">+</p>
        <p>Hacé click o arrastrá fotos acá</p>
        <p style="font-size:.8rem;">JPG, PNG, WebP — Máx 5MB</p>
        <input type="file" id="file-input" accept="image/*" multiple>
      </div>

      <div class="dash-gallery" id="photos-grid"></div>
    </main>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await authHelpers.requireAuth();
      if (!user) return;

      // get_my_profile trae el estado de consentimiento junto con el perfil.
      const { data: rows } = await window.supabaseClient.rpc('get_my_profile');
      const escort = rows && rows[0];

      if (!escort) { window.location.href = '/dashboard/perfil.html'; return; }

      const gate = document.getElementById('consent-gate');
      const uploadArea = document.getElementById('upload-area');

      // Muestra el gate o el área de subida según haya consentido o no.
      function reflectConsent(hasConsent) {
        gate.style.display = hasConsent ? 'none' : 'block';
        uploadArea.style.display = hasConsent ? 'flex' : 'none';
      }

      const consentCheck = document.getElementById('consent-check');
      const consentAccept = document.getElementById('consent-accept');
      consentCheck.addEventListener('change', () => {
        consentAccept.disabled = !consentCheck.checked;
      });
      consentAccept.addEventListener('click', async () => {
        if (!consentCheck.checked) return;
        consentAccept.disabled = true;
        const { data, error } = await window.supabaseClient.rpc('accept_photo_consent');
        if (error || !data?.ok) {
          consentAccept.disabled = false;
          alert('No se pudo registrar el consentimiento. Intentá de nuevo.');
          return;
        }
        reflectConsent(true);
      });

      reflectConsent(escort.consentimiento_fotos === true);

      async function loadPhotos() {
        const photos = await galleryHelpers.fetchPhotos(escort.id);
        const grid = document.getElementById('photos-grid');
        grid.innerHTML = '';

        photos.forEach(photo => {
          const item = document.createElement('div');
          item.className = 'dash-gallery-item';

          const img = document.createElement('img');
          img.src = photo.url;
          img.loading = 'lazy';

          const btn = document.createElement('button');
          btn.className = 'delete-btn';
          btn.textContent = '×';
          btn.addEventListener('click', async () => {
            if (!confirm('¿Eliminar esta foto?')) return;
            await uploadHelpers.deletePhoto(photo.id);
            loadPhotos();
          });

          item.append(img, btn);
          grid.appendChild(item);
        });
      }

      document.getElementById('upload-area').addEventListener('click', () => {
        document.getElementById('file-input').click();
      });

      document.getElementById('file-input').addEventListener('change', async (e) => {
        for (const file of e.target.files) {
          try {
            await uploadHelpers.uploadPhoto(escort.id, file);
          } catch (err) {
            alert(err.message || 'No se pudo subir la imagen.');
          }
        }
        loadPhotos();
      });

      const area = document.getElementById('upload-area');
      area.addEventListener('dragover', (e) => { e.preventDefault(); area.style.borderColor = 'var(--gold)'; });
      area.addEventListener('dragleave', () => { area.style.borderColor = ''; });
      area.addEventListener('drop', async (e) => {
        e.preventDefault();
        area.style.borderColor = '';
        for (const file of e.dataTransfer.files) {
          try {
            await uploadHelpers.uploadPhoto(escort.id, file);
          } catch (err) {
            alert(err.message || 'No se pudo subir la imagen.');
          }
        }
        loadPhotos();
      });

      await loadPhotos();
    });
  </script>
</body>
</html>
