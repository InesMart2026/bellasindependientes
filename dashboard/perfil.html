<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil — ECR</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase.js"></script>
  <script src="/js/auth.js" defer></script>
</head>
<body>
  <div class="dashboard-layout">
    <aside class="dashboard-sidebar">
      <a href="/dashboard/" class="header-logo">ECR</a>
      <ul class="dashboard-nav">
        <li><a href="/dashboard/">Panel</a></li>
        <li><a href="/dashboard/fotos.html">Mis Fotos</a></li>
        <li><a href="/dashboard/perfil.html" class="active">Mi Perfil</a></li>
        <li><a href="/dashboard/plan.html">Mi Plan</a></li>
        <li><a href="#" onclick="authHelpers.logout()">Cerrar sesión</a></li>
      </ul>
    </aside>

    <main class="dashboard-main">
      <div class="dashboard-header">
        <h2>Mi Perfil</h2>
      </div>

      <form id="profile-form" style="max-width:600px;">
        <div class="form-group">
          <label>Nombre público</label>
          <input type="text" id="nombre" required placeholder="Ej: Sofía">
        </div>

        <div class="form-group">
          <label>Slug (URL de tu perfil)</label>
          <input type="text" id="slug" required placeholder="ej: sofia">
        </div>

        <div class="form-group">
          <label>Categoría</label>
          <select id="categoria">
            <option value="mujeres">Mujeres</option>
            <option value="hombres">Hombres</option>
            <option value="trans">Trans</option>
          </select>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
          <div class="form-group">
            <label>Edad</label>
            <input type="number" id="edad" min="18" max="99">
          </div>
          <div class="form-group">
            <label>Ubicación</label>
            <input type="text" id="ubicacion" placeholder="Ej: Buenos Aires">
          </div>
        </div>

        <div class="form-group">
          <label>Sobre vos</label>
          <textarea id="bio" maxlength="500"></textarea>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
          <div class="form-group">
            <label>Instagram (opcional)</label>
            <input type="text" id="instagram" placeholder="@usuario">
          </div>
          <div class="form-group">
            <label>WhatsApp (opcional)</label>
            <input type="text" id="whatsapp" placeholder="5491112345678">
          </div>
        </div>

        <hr style="border-color:var(--border);margin:2rem 0;">

        <h3 style="margin-bottom:1rem;">Verificación de identidad</h3>

        <div class="form-group">
          <label>Foto de tu DNI</label>
          <p style="color:var(--text-secondary);font-size:.85rem;margin-bottom:.5rem;">
            Subí una foto de tu DNI para verificar que sos mayor de edad.
            Solo visible para administradores.
          </p>
          <div class="upload-area" id="dni-upload-area" style="padding:1.5rem;">
            <input type="file" id="dni-upload" accept="image/*">
            <p id="dni-status">Hacé click para subir</p>
          </div>
          <div id="verification-status"></div>
        </div>

        <button type="submit" class="btn btn-gold">Guardar</button>
      </form>
    </main>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await authHelpers.requireAuth();
      if (!user) return;

      let escortId = null;

      const { data: escort } = await window.supabaseClient
        .rpc('get_my_profile')
        .maybeSingle();

      if (escort) {
        escortId = escort.id;
        document.getElementById('nombre').value = escort.nombre || '';
        document.getElementById('slug').value = escort.slug || '';
        document.getElementById('categoria').value = escort.categoria || 'mujeres';
        document.getElementById('edad').value = escort.edad || '';
        document.getElementById('ubicacion').value = escort.ubicacion || '';
        document.getElementById('bio').value = escort.bio || '';
        document.getElementById('instagram').value = escort.instagram || '';
        document.getElementById('whatsapp').value = escort.whatsapp || '';
      }

      if (escortId) {
        const { data: verif } = await window.supabaseClient
          .from('verification_photos')
          .select('verified')
          .eq('escort_id', escortId)
          .maybeSingle();

        if (verif?.verified) {
          document.getElementById('verification-status').innerHTML =
            '<span style="color:var(--gold);font-size:.85rem;">✓ Documento verificado</span>';
          document.getElementById('dni-upload-area').style.display = 'none';
        }
      }

      document.getElementById('profile-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const formData = {
          nombre: document.getElementById('nombre').value,
          slug: document.getElementById('slug').value,
          categoria: document.getElementById('categoria').value,
          edad: parseInt(document.getElementById('edad').value) || null,
          ubicacion: document.getElementById('ubicacion').value,
          bio: document.getElementById('bio').value,
          instagram: document.getElementById('instagram').value,
          whatsapp: document.getElementById('whatsapp').value,
          user_id: user.id
        };

        if (escort) {
          await window.supabaseClient.from('escorts').update(formData).eq('id', escort.id);
        } else {
          const { data: newEscort } = await window.supabaseClient.from('escorts').insert(formData).select().single();
          escortId = newEscort.id;
        }

        alert('Perfil guardado correctamente');
        window.location.href = '/dashboard/';
      });

      document.getElementById('dni-upload-area').addEventListener('click', () => {
        document.getElementById('dni-upload').click();
      });

      document.getElementById('dni-upload').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file || !escortId) return;

        const ext = file.name.split('.').pop();
        const path = `dni_${escortId}.${ext}`;

        document.getElementById('dni-status').textContent = 'Subiendo...';

        await window.supabaseClient.storage.from('verification-docs').upload(path, file, { upsert: true });

        const { data: { publicUrl } } = window.supabaseClient.storage.from('verification-docs').getPublicUrl(path);

        await window.supabaseClient.from('verification_photos').upsert({
          escort_id: escortId,
          url: publicUrl,
          verified: false
        });

        document.getElementById('dni-status').textContent = '✓ Documento recibido';
        document.getElementById('verification-status').innerHTML =
          '<span style="color:var(--text-secondary);font-size:.85rem;">Recibido. Esperá verificación del administrador.</span>';
      });
    });
  </script>
</body>
</html>
