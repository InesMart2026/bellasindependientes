<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil — Bellas Independientes</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase.js"></script>
  <script src="/js/auth.js" defer></script>
  <script src="/js/gallery.js" defer></script>
</head>
<body>
  <div class="dashboard-layout">
    <aside class="dashboard-sidebar">
      <a href="/dashboard/" class="header-logo">Bellas Independientes</a>
      <ul class="dashboard-nav">
        <li><a href="/dashboard/">Panel</a></li>
        <li><a href="/dashboard/fotos.html">Mis Fotos</a></li>
        <li><a href="/dashboard/perfil.html" class="active">Mi Perfil</a></li>
        <li><a href="/dashboard/verificacion.html">Verificación</a></li>
        <li><a href="/dashboard/plan.html">Mi Plan</a></li>
        <li><a href="#" onclick="authHelpers.logout()">Cerrar sesión</a></li>
      </ul>
    </aside>

    <main class="dashboard-main">
      <div class="dashboard-header">
        <h2>Mi Perfil</h2>
      </div>

      <form id="profile-form" style="max-width:600px;">
        <div class="form-group">
          <label>Nombre público</label>
          <input type="text" id="nombre" required placeholder="Ej: Sofía">
        </div>

        <div class="form-group">
          <label>Slug (URL de tu perfil)</label>
          <input type="text" id="slug" required placeholder="ej: sofia">
        </div>

        <div class="form-group">
          <label>Categoría</label>
          <select id="categoria">
            <option value="mujeres">Mujeres</option>
            <option value="hombres">Hombres</option>
            <option value="trans">Trans</option>
            <option value="masajistas">Masajistas</option>
          </select>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
          <div class="form-group">
            <label>Edad</label>
            <input type="number" id="edad" min="18" max="99">
          </div>
          <div class="form-group">
            <label>Provincia donde te publicás</label>
            <select id="ubicacion" required>
              <option value="">Elegí una provincia</option>
            </select>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
          <div class="form-group">
            <label>Zona / barrio</label>
            <input type="text" id="zona" placeholder="Ej: Palermo">
          </div>
          <div class="form-group">
            <label>Tarifa por hora (ARS)</label>
            <input type="number" id="tarifa" min="0" step="500" placeholder="Ej: 25000">
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
          <div class="form-group">
            <label>Horario de atención</label>
            <input type="text" id="horario" placeholder="Ej: 10 a 22 hs">
          </div>
          <div class="form-group">
            <label>Nacionalidad</label>
            <input type="text" id="nacionalidad" placeholder="Ej: Argentina">
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;">
          <div class="form-group">
            <label>Altura (cm)</label>
            <input type="number" id="altura" min="100" max="230" placeholder="Ej: 170">
          </div>
          <div class="form-group">
            <label>Ojos</label>
            <input type="text" id="ojos" placeholder="Ej: Marrones">
          </div>
          <div class="form-group">
            <label>Cabello</label>
            <input type="text" id="cabello" placeholder="Ej: Castaño">
          </div>
        </div>

        <div class="form-group">
          <label>Sobre vos</label>
          <textarea id="bio" maxlength="500"></textarea>
        </div>

        <div class="form-group">
          <label>Servicios</label>
          <p style="font-size:.85rem;color:var(--text-secondary);margin:-.35rem 0 .75rem;">
            Elegí lo que ofrecés. Solo se publican estas opciones.
          </p>
          <div id="servicios-box"></div>
        </div>

        <div class="form-group">
          <label>Idiomas (separados por coma)</label>
          <input type="text" id="idiomas" placeholder="Ej: Español, Inglés">
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
          <div class="form-group">
            <label>Instagram (opcional)</label>
            <input type="text" id="instagram" placeholder="@usuario">
          </div>
          <div class="form-group">
            <label>WhatsApp (opcional)</label>
            <input type="text" id="whatsapp" placeholder="5491112345678">
          </div>
        </div>

        <button type="submit" class="btn btn-gold">Guardar</button>
      </form>
    </main>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await authHelpers.requireAuth();
      if (!user) return;

      const [{ data: escort }, { data: catalogo }, { data: provincias }] = await Promise.all([
        window.supabaseClient.rpc('get_my_profile').maybeSingle(),
        window.supabaseClient.rpc('get_servicios_catalogo'),
        window.supabaseClient.rpc('get_provincias_catalogo'),
      ]);

      renderServicios(catalogo || [], escort?.servicios || []);
      // Antes de asignar el valor guardado: un <select> vacío ignora el .value.
      renderProvincias(provincias || []);

      if (escort) {
        document.getElementById('nombre').value = escort.nombre || '';
        document.getElementById('slug').value = escort.slug || '';
        document.getElementById('categoria').value = escort.categoria || 'mujeres';
        document.getElementById('edad').value = escort.edad || '';
        document.getElementById('ubicacion').value = escort.ubicacion || '';
        document.getElementById('bio').value = escort.bio || '';
        document.getElementById('instagram').value = escort.instagram || '';
        document.getElementById('whatsapp').value = escort.whatsapp || '';
        document.getElementById('zona').value = escort.zona || '';
        document.getElementById('tarifa').value = escort.tarifa || '';
        document.getElementById('horario').value = escort.horario || '';
        document.getElementById('nacionalidad').value = escort.nacionalidad || '';
        document.getElementById('altura').value = escort.altura || '';
        document.getElementById('ojos').value = escort.ojos || '';
        document.getElementById('cabello').value = escort.cabello || '';
        document.getElementById('idiomas').value = escort.idiomas || '';
      }

      document.getElementById('profile-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const val = (id) => document.getElementById(id).value.trim() || null;
        const formData = {
          nombre: document.getElementById('nombre').value,
          slug: document.getElementById('slug').value,
          categoria: document.getElementById('categoria').value,
          edad: parseInt(document.getElementById('edad').value) || null,
          ubicacion: val('ubicacion'),
          bio: val('bio'),
          instagram: val('instagram'),
          whatsapp: val('whatsapp'),
          zona: val('zona'),
          tarifa: parseFloat(document.getElementById('tarifa').value) || null,
          horario: val('horario'),
          nacionalidad: val('nacionalidad'),
          altura: parseInt(document.getElementById('altura').value) || null,
          ojos: val('ojos'),
          cabello: val('cabello'),
          servicios: serviciosElegidos(),
          idiomas: val('idiomas'),
          user_id: user.id
        };

        // upsert sobre user_id: crea el perfil si no existe y lo actualiza si ya
        // existe, sin depender de la variable `escort` cargada al abrir la página
        // (quedaba desactualizada tras el primer guardado y reventaba el unique).
        const { error } = await window.supabaseClient
          .from('escorts')
          .upsert(formData, { onConflict: 'user_id' });

        // El trigger validate_servicios rechaza cualquier servicio fuera del
        // catálogo. Sin este chequeo el guardado fallaba en silencio.
        if (error) {
          alert('No se pudo guardar el perfil: ' + error.message);
          return;
        }

        alert('Perfil guardado correctamente');
        window.location.href = '/dashboard/';
      });

      // Pinta el catálogo agrupado y marca lo que la escort ya tenía elegido.
      // El catálogo lo carga un admin, pero igual se escapa: nada que venga de
      // la DB entra crudo a innerHTML.
      function renderServicios(catalogo, elegidos) {
        const box = document.getElementById('servicios-box');
        const esc = window.galleryHelpers.escapeHtml;
        const titulos = { modalidad: 'Modalidad', extras: 'Extras' };
        const grupos = [...new Set(catalogo.map(s => s.grupo))];

        box.innerHTML = grupos.map(grupo => `
          <p style="font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text-secondary);margin:.85rem 0 .5rem;">
            ${esc(titulos[grupo] || grupo)}
          </p>
          <div style="display:flex;flex-wrap:wrap;gap:.5rem;">
            ${catalogo.filter(s => s.grupo === grupo).map(s => `
              <label class="servicio-chip">
                <input type="checkbox" name="servicio" value="${esc(s.slug)}"
                       ${elegidos.includes(s.slug) ? 'checked' : ''}>
                <span>${esc(s.nombre)}</span>
              </label>
            `).join('')}
          </div>
        `).join('');
      }

      function serviciosElegidos() {
        return [...document.querySelectorAll('input[name="servicio"]:checked')]
          .map(el => el.value);
      }

      // La provincia se guarda como slug ('tucuman'), no como nombre visible:
      // el trigger validate_ubicacion solo acepta slugs del catálogo.
      function renderProvincias(lista) {
        const sel = document.getElementById('ubicacion');
        lista.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p.slug;
          opt.textContent = p.nombre;
          sel.appendChild(opt);
        });
      }
    });
  </script>
</body>
</html>
