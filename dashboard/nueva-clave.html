<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/img/favicon-192.png">
  <link rel="apple-touch-icon" href="/img/apple-touch-icon.png">
  <title>Nueva contraseña — Bellas Independientes</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase.js"></script>
  <script src="/js/auth.js" defer></script>
</head>
<body style="display:flex;justify-content:center;align-items:center;min-height:100vh;">
  <div style="max-width:400px;width:100%;padding:2rem;">
    <a href="/" class="header-logo" style="display:block;text-align:center;margin-bottom:2rem;">Bellas Independientes</a>
    <h2 style="text-align:center;margin-bottom:.5rem;">Nueva contraseña</h2>
    <p style="text-align:center;color:var(--text-secondary);margin-bottom:2rem;">Elegí una contraseña nueva para tu cuenta</p>

    <div id="message" style="display:none;padding:1rem;margin-bottom:1rem;border-radius:4px;"></div>

    <form id="reset-form">
      <div class="form-group">
        <label>Nueva contraseña</label>
        <input type="password" id="password" required minlength="8"
               placeholder="Mínimo 8 caracteres" autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-gold" style="width:100%;" id="submit-btn">Guardar contraseña</button>
    </form>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Al llegar desde el email de recuperación, supabase-js crea una sesión
      // temporal a partir del token de la URL. Con esa sesión se puede fijar
      // la nueva clave con updateUser.
      const form = document.getElementById('reset-form');
      const btn = document.getElementById('submit-btn');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const password = document.getElementById('password').value;
        btn.disabled = true;
        btn.textContent = 'Guardando...';

        const { error } = await window.supabaseClient.auth.updateUser({ password });

        if (error) {
          showMessage('No se pudo cambiar la contraseña. El link puede haber vencido; pedí uno nuevo desde el login.', 'error');
          btn.disabled = false;
          btn.textContent = 'Guardar contraseña';
          return;
        }

        showMessage('Contraseña actualizada. Redirigiendo...', 'success');
        setTimeout(() => { window.location.href = '/dashboard/'; }, 1500);
      });

      function showMessage(text, type) {
        const msg = document.getElementById('message');
        msg.style.display = 'block';
        msg.textContent = text;
        msg.style.background = type === 'success' ? 'rgba(212,175,55,.1)' : 'rgba(255,0,0,.1)';
        msg.style.color = type === 'success' ? 'var(--gold)' : '#ff4444';
      }
    });
  </script>
</body>
</html>
