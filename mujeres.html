<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mujeres — ECR</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase.js"></script>
  <script src="/js/gallery.js" defer></script>
</head>
<body>
  <header class="header">
    <a href="/" class="header-logo">ECR</a>
    <nav class="header-nav">
      <a href="/mujeres.html">Mujeres</a>
      <a href="/hombres.html">Hombres</a>
      <a href="/trans.html">Trans</a>
      <a href="/planes.html">Planes</a>
      <a href="/dashboard/login.html">Acceder</a>
    </nav>
  </header>

  <h2 class="section-title">Mujeres</h2>

  <div class="filter-bar">
    <div class="filter-search">
      <span class="search-icon">&#x1F50D;</span>
      <input type="text" id="filter-search" placeholder="Buscar por nombre o ubicación..." autocomplete="off">
    </div>
    <div class="filter-group">
      <label>Edad</label>
      <input type="number" id="filter-edad-min" placeholder="Min" min="18" max="99">
      <span style="color:var(--text-secondary);">—</span>
      <input type="number" id="filter-edad-max" placeholder="Max" min="18" max="99">
    </div>
    <div class="filter-group">
      <label>Ordenar</label>
      <select id="filter-sort">
        <option value="fecha">Más nuevas</option>
        <option value="nombre">Nombre A-Z</option>
      </select>
    </div>
  </div>

  <div class="grid" id="escorts-grid"></div>

  <div id="lightbox" class="lightbox">
    <button class="lightbox-close" onclick="galleryHelpers.closeLightbox()">×</button>
    <img src="" alt="Foto">
  </div>

  <footer class="footer">
    <p>ECR &copy; 2026 &mdash; Todos los derechos reservados</p>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const escorts = await galleryHelpers.fetchEscorts('mujeres');

        async function applyFilters() {
          const filtered = galleryHelpers.filterEscorts(escorts, {
            search: document.getElementById('filter-search').value,
            edadMin: document.getElementById('filter-edad-min').value,
            edadMax: document.getElementById('filter-edad-max').value,
            sort: document.getElementById('filter-sort').value
          });
          await galleryHelpers.renderGrid(filtered, 'escorts-grid');
        }

        document.getElementById('filter-search').addEventListener('input', applyFilters);
        document.getElementById('filter-edad-min').addEventListener('input', applyFilters);
        document.getElementById('filter-edad-max').addEventListener('input', applyFilters);
        document.getElementById('filter-sort').addEventListener('change', applyFilters);

        await applyFilters();
      } catch (err) { console.error(err); }
    });
  </script>
</body>
</html>
